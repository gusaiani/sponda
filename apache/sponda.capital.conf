<VirtualHost *:80>
    ServerName sponda.capital
    ServerAlias www.sponda.capital
    DocumentRoot /var/www/html
    RewriteEngine on
    RewriteCond %{SERVER_NAME} =sponda.capital [OR]
    RewriteCond %{SERVER_NAME} =www.sponda.capital
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName sponda.capital
    ServerAlias www.sponda.capital

    ProxyPreserveHost On

    # All traffic goes to Next.js (which proxies API calls to Django internally)
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    RequestHeader set X-Forwarded-Proto "https"

    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/sponda.capital/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/sponda.capital/privkey.pem
</VirtualHost>
</IfModule>
