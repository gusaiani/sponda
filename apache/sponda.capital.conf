# Redirect all HTTP traffic to https://sponda.capital (non-www)
<VirtualHost *:80>
    ServerName sponda.capital
    ServerAlias www.sponda.capital
    DocumentRoot /var/www/html
    RewriteEngine on
    RewriteRule ^ https://sponda.capital%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
<IfModule mod_ssl.c>
# Redirect www HTTPS to non-www HTTPS
<VirtualHost *:443>
    ServerName www.sponda.capital

    RewriteEngine on
    RewriteRule ^ https://sponda.capital%{REQUEST_URI} [END,NE,R=permanent]

    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/sponda.capital/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/sponda.capital/privkey.pem
</VirtualHost>
# Main site — non-www only
<VirtualHost *:443>
    ServerName sponda.capital

    ProxyPreserveHost On

    ProxyPass / http://127.0.0.1:3100/
    ProxyPassReverse / http://127.0.0.1:3100/

    RequestHeader set X-Forwarded-Proto "https"

    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/sponda.capital/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/sponda.capital/privkey.pem
</VirtualHost>
</IfModule>
