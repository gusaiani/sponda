name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Run tests
        working-directory: backend
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          BRAPI_API_KEY: test-api-key-for-ci
        run: pytest -x -q

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 159.203.108.19
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/sponda
            git fetch origin main
            git reset --hard origin/main
            source venv/bin/activate
            pip install -r backend/requirements.txt
            n lts -y
            hash -r
            cd frontend
            npm ci
            npm run build
            export DJANGO_SETTINGS_MODULE=config.settings.production
            cd /opt/sponda/backend
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput
            python manage.py refresh_ipca
            python manage.py refresh_tickers
            # Install systemd timer for daily data refresh
            cp /opt/sponda/systemd/sponda-refresh.service /etc/systemd/system/
            cp /opt/sponda/systemd/sponda-refresh.timer /etc/systemd/system/
            systemctl daemon-reload
            systemctl enable --now sponda-refresh.timer
            systemctl restart sponda
