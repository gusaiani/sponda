name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sponda
          POSTGRES_PASSWORD: sponda
          POSTGRES_DB: sponda_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: uv pip install --system -r backend/requirements.txt

      - name: Run unit and integration tests
        working-directory: backend
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          BRAPI_API_KEY: test-api-key-for-ci
          DEV_DATABASE_URL: postgres://sponda:sponda@localhost:5432/sponda_test
        run: pytest -x -q --ignore=tests/test_e2e.py --ignore=tests/test_e2e_browser.py --ignore=tests/test_e2e_favorites.py --ignore=tests/test_e2e_auth.py

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install and test
        working-directory: frontend
        run: npm ci && npm test

  e2e-tests:
    name: e2e-tests (${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard:
          - test_e2e_auth.py
          - test_e2e_browser.py
          - test_e2e_favorites.py
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sponda
          POSTGRES_PASSWORD: sponda
          POSTGRES_DB: sponda_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: uv pip install --system -r backend/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/src/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}-

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Run e2e tests
        working-directory: backend
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          BRAPI_API_KEY: test-api-key-for-ci
          GOOGLE_CLIENT_ID: test-client-id
          DEV_DATABASE_URL: postgres://sponda:sponda@localhost:5432/sponda_test
        run: pytest -q --timeout=120 --reruns 1 --reruns-delay 2 tests/${{ matrix.shard }}

  e2e-tests-summary:
    name: e2e-tests
    needs: e2e-tests
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any shard failed
        if: needs.e2e-tests.result != 'success'
        run: exit 1

  # Build the Next.js bundle on the CI runner (16 GB RAM), never on the
  # 2-core / 4 GB prod box. An OOM-killed `next build` on the box once
  # left a corrupt .next with no BUILD_ID, crash-looping the frontend
  # into a 12-hour outage. The runner produces the artifact; the box
  # only unpacks it.
  build-frontend:
    needs: [unit-tests, frontend-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        working-directory: frontend
        env:
          # NEXT_PUBLIC_* are baked into the browser bundle at build time.
          # They used to be sourced from /opt/sponda/.env on the box; now
          # they must be provided here. SENTRY_RELEASE is the deployed SHA.
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          NEXT_PUBLIC_SENTRY_ENVIRONMENT: production
          NEXT_PUBLIC_SENTRY_RELEASE: ${{ github.sha }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
        run: |
          npm ci
          npm run build
          test -f .next/BUILD_ID
      - name: Package .next
        working-directory: frontend
        run: tar -czf /tmp/next-build.tar.gz .next
      - uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: /tmp/next-build.tar.gz
          retention-days: 3

  deploy:
    needs: [build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      # Download into the job workspace, not /tmp. appleboy/scp-action
      # runs in a Docker container that only mounts $GITHUB_WORKSPACE;
      # a /tmp path on the runner is invisible to it ("tar: empty
      # archive"). Source must be a workspace-relative path.
      - uses: actions/download-artifact@v4
        with:
          name: next-build
          path: _artifact
      - name: Copy build artifact to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 159.203.108.19
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: _artifact/next-build.tar.gz
          target: /opt/sponda/_deploy
          strip_components: 1
          overwrite: true
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 159.203.108.19
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /opt/sponda
            git fetch origin main
            git reset --hard origin/main

            # Tag the backend Sentry release with the deployed SHA. The
            # frontend's NEXT_PUBLIC_SENTRY_RELEASE is already baked into
            # the artifact by the build-frontend job, so it is no longer
            # written here.
            SENTRY_SHA=$(git rev-parse HEAD)
            if grep -q "^SENTRY_RELEASE=" /opt/sponda/.env; then
              sed -i "s|^SENTRY_RELEASE=.*|SENTRY_RELEASE=${SENTRY_SHA}|" /opt/sponda/.env
            else
              echo "SENTRY_RELEASE=${SENTRY_SHA}" >> /opt/sponda/.env
            fi

            source venv/bin/activate
            command -v uv >/dev/null || pip install uv
            uv pip install -r backend/requirements.txt

            # Runtime node deps only. NO `next build` on the box — the
            # bundle was built in CI. `npm ci` is CPU-bound (~1 min) but
            # does not balloon memory the way `next build` did.
            cd /opt/sponda/frontend
            npm ci

            # Atomically swap in the CI-built .next. Refuse a corrupt
            # artifact (missing BUILD_ID) before touching the live dir,
            # and keep the previous build as .next.old for rollback.
            rm -rf .next.incoming
            mkdir .next.incoming
            tar -xzf /opt/sponda/_deploy/next-build.tar.gz -C .next.incoming
            test -f .next.incoming/.next/BUILD_ID
            rm -rf .next.old
            [ -d .next ] && mv .next .next.old
            mv .next.incoming/.next .next
            rm -rf .next.incoming
            cd /opt/sponda

            # Build Hugo blog (blog.sponda.capital)
            # Install a known-good Hugo extended build to /usr/local/bin
            # (Ubuntu's apt ships 0.92.2 which predates hugo.toml support).
            HUGO_VERSION="0.160.1"
            HUGO_BIN=/usr/local/bin/hugo
            if ! "$HUGO_BIN" version 2>/dev/null | grep -q "v${HUGO_VERSION}"; then
              curl -sSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" \
                | tar xz -C /usr/local/bin hugo
            fi
            cd /opt/sponda/blog
            "$HUGO_BIN" --minify --gc
            cd /opt/sponda

            # Django migrations and data refresh
            export DJANGO_SETTINGS_MODULE=config.settings.production
            cd /opt/sponda/backend
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput
            python manage.py import_analyses /opt/sponda/backend/analyses.json

            # Install systemd services and timers
            cp /opt/sponda/systemd/sponda.service /etc/systemd/system/
            cp /opt/sponda/systemd/sponda-celery.service /etc/systemd/system/
            cp /opt/sponda/systemd/sponda-frontend.service /etc/systemd/system/
            cp /opt/sponda/systemd/sponda-refresh.service /etc/systemd/system/
            cp /opt/sponda/systemd/sponda-refresh.timer /etc/systemd/system/
            cp /opt/sponda/systemd/sponda-revisit-reminders.service /etc/systemd/system/
            cp /opt/sponda/systemd/sponda-revisit-reminders.timer /etc/systemd/system/
            cp /opt/sponda/systemd/sponda-refresh-snapshots.service /etc/systemd/system/
            cp /opt/sponda/systemd/sponda-refresh-snapshots.timer /etc/systemd/system/
            cp /opt/sponda/systemd/sponda-refresh-fundamentals.service /etc/systemd/system/
            cp /opt/sponda/systemd/sponda-refresh-fundamentals.timer /etc/systemd/system/
            cp /opt/sponda/systemd/sponda-check-alerts.service /etc/systemd/system/
            cp /opt/sponda/systemd/sponda-check-alerts.timer /etc/systemd/system/
            cp /opt/sponda/systemd/sponda-refresh-fx.service /etc/systemd/system/
            cp /opt/sponda/systemd/sponda-refresh-fx.timer /etc/systemd/system/
            systemctl daemon-reload
            systemctl enable --now sponda-refresh.timer
            systemctl enable --now sponda-revisit-reminders.timer
            systemctl enable --now sponda-refresh-snapshots.timer
            systemctl enable --now sponda-refresh-fundamentals.timer
            systemctl enable --now sponda-check-alerts.timer
            systemctl enable --now sponda-refresh-fx.timer

            # Update Nginx config and reload
            cp /opt/sponda/nginx/gzip.conf /etc/nginx/conf.d/gzip.conf
            cp /opt/sponda/nginx/sponda.capital.conf /etc/nginx/sites-available/
            cp /opt/sponda/nginx/blog.sponda.capital.conf /etc/nginx/sites-available/
            nginx -t && systemctl reload nginx

            # Restart services
            systemctl restart sponda
            # The Celery worker is a long-running process: without a restart it
            # keeps executing the code it loaded at boot, so deployed task fixes
            # never take effect (an open-circuit error kept reaching Sentry from
            # a worker that had been up since before the fix landed).
            systemctl enable sponda-celery
            systemctl restart sponda-celery
            systemctl enable sponda-frontend
            systemctl restart sponda-frontend

            # Health gate: a corrupt/incompatible build must not be left
            # crash-looping the live site. Poll the frontend; on failure
            # roll .next back to the previous build and fail the deploy.
            FRONTEND_OK=
            for _ in $(seq 1 20); do
              sleep 3
              if curl -fsS -o /dev/null --max-time 5 http://127.0.0.1:3100/; then
                FRONTEND_OK=1
                break
              fi
            done
            if [ -z "$FRONTEND_OK" ]; then
              echo "Frontend failed health check after restart; rolling back .next"
              cd /opt/sponda/frontend
              rm -rf .next
              if [ -d .next.old ]; then
                mv .next.old .next
                systemctl restart sponda-frontend
              fi
              exit 1
            fi
            rm -rf /opt/sponda/frontend/.next.old /opt/sponda/_deploy/next-build.tar.gz
