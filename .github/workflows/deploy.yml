name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/src/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}-

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Run unit and integration tests
        working-directory: backend
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          BRAPI_API_KEY: test-api-key-for-ci
          DEV_DATABASE_URL: sqlite:///test_db.sqlite3
        run: pytest -x -q --ignore=tests/test_e2e.py --ignore=tests/test_e2e_browser.py --ignore=tests/test_e2e_favorites.py --ignore=tests/test_e2e_auth.py

      - name: Run e2e tests
        working-directory: backend
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          BRAPI_API_KEY: test-api-key-for-ci
          GOOGLE_CLIENT_ID: test-client-id
          DEV_DATABASE_URL: sqlite:///test_db.sqlite3
        run: pytest -x -q --timeout=120 tests/test_e2e_browser.py tests/test_e2e_favorites.py tests/test_e2e_auth.py || pytest -x -q --timeout=120 tests/test_e2e_browser.py tests/test_e2e_favorites.py tests/test_e2e_auth.py

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 159.203.108.19
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /opt/sponda
            git fetch origin main
            git reset --hard origin/main
            source venv/bin/activate
            pip install -r backend/requirements.txt
            command -v n >/dev/null || npm install -g n
            n lts -y
            hash -r

            # Build Next.js frontend
            cd frontend
            npm ci
            npm run build
            cd /opt/sponda

            # Django migrations and data refresh
            export DJANGO_SETTINGS_MODULE=config.settings.production
            cd /opt/sponda/backend
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput
            python manage.py import_analyses /opt/sponda/backend/analyses.json

            # Install systemd services and timers
            cp /opt/sponda/systemd/sponda-frontend.service /etc/systemd/system/
            cp /opt/sponda/systemd/sponda-refresh.service /etc/systemd/system/
            cp /opt/sponda/systemd/sponda-refresh.timer /etc/systemd/system/
            systemctl disable --now sponda-og-images.timer 2>/dev/null || true
            systemctl disable --now sponda-og-images.service 2>/dev/null || true
            rm -f /etc/systemd/system/sponda-og-images.service /etc/systemd/system/sponda-og-images.timer
            systemctl daemon-reload
            systemctl enable --now sponda-refresh.timer

            # Update Apache: proxy sponda domains to Next.js (port 3100)
            # Handle both fresh (8710) and previous deploy (3000) states
            sed -i -E 's|ProxyPass / http://127.0.0.1:(8710\|3000)/|ProxyPass / http://127.0.0.1:3100/|g' /etc/apache2/sites-enabled/*.conf
            sed -i -E 's|ProxyPassReverse / http://127.0.0.1:(8710\|3000)/|ProxyPassReverse / http://127.0.0.1:3100/|g' /etc/apache2/sites-enabled/*.conf
            apachectl configtest && systemctl reload apache2

            # Restart services
            systemctl restart sponda
            systemctl enable --now sponda-frontend
            systemctl restart sponda-frontend
