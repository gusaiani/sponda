services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: sponda
      POSTGRES_USER: sponda
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sponda}
    ports:
      - "5432:5432"

  web:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://sponda:${POSTGRES_PASSWORD:-sponda}@db:5432/sponda
    depends_on:
      - db
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/sponda.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web

volumes:
  postgres_data:
