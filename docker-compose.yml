services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: sponda
      POSTGRES_USER: sponda
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sponda}

  web:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://sponda:${POSTGRES_PASSWORD:-sponda}@db:5432/sponda
    depends_on:
      - db
    ports:
      - "8710:8000"
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"

volumes:
  postgres_data:
