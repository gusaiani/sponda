server {
    listen 80;
    server_name sponda.poe.ma;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sponda.poe.ma;

    ssl_certificate /etc/letsencrypt/live/sponda.poe.ma/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sponda.poe.ma/privkey.pem;

    location /api/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://web:8000;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # SPA fallback — try static files first, then proxy to Django
        try_files $uri $uri/ @frontend;
    }

    location @frontend {
        proxy_pass http://web:8000;
    }
}
