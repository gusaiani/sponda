# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name blog.sponda.capital;
    return 301 https://blog.sponda.capital$request_uri;
}

server {
    listen 443 ssl http2;
    server_name blog.sponda.capital;

    ssl_certificate /etc/letsencrypt/live/blog.sponda.capital/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blog.sponda.capital/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/sponda/blog/public;
    index index.html;

    # Clean URLs: /foo → /foo/index.html; fall back to /foo.html if needed
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Aggressive cache for hashed/static assets
    location ~* \.(css|js|png|jpg|jpeg|svg|woff2|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/blog.sponda.capital-access.log;
    error_log /var/log/nginx/blog.sponda.capital-error.log;
}
