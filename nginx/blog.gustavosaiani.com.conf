server {
    listen 80;
    server_name blog.gustavosaiani.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name blog.gustavosaiani.com;

    root /var/www/blog.gustavosaiani.com;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/blog.gustavosaiani.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blog.gustavosaiani.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    error_log /var/log/nginx/blog.gustavosaiani.com-error.log;
    access_log /var/log/nginx/blog.gustavosaiani.com-access.log;
}
