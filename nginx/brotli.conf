# Brotli compression — typically saves ~20% over gzip on JS/CSS payloads.
#
# Prerequisites (Ubuntu/Debian, Nginx Plus / open-source nginx with the
# brotli dynamic module):
#
#     sudo apt install libnginx-mod-brotli
#
# (Or build nginx with `--add-module=/path/to/ngx_brotli`.)
#
# This file is meant to be included from /etc/nginx/nginx.conf inside
# the `http {}` block, parallel to gzip.conf. If the module is not
# loaded, nginx will fail to start with "unknown directive 'brotli'" —
# in that case install the module first or comment out this include.

brotli on;
brotli_comp_level 5;
brotli_min_length 256;
brotli_static on;
brotli_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/xml+rss
    application/x-javascript
    application/wasm
    image/svg+xml
    font/woff2;
