server {
    listen 80;
    server_name sponda.poe.ma;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sponda.poe.ma;

    ssl_certificate /etc/letsencrypt/live/sponda.poe.ma/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sponda.poe.ma/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Serve logos directly from Django, bypassing Next.js middleware
    # (Next.js rewrite returns HTTP 500 for binary responses)
    location /api/logos/ {
        proxy_pass http://127.0.0.1:8710;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    access_log /var/log/nginx/sponda.poe.ma-access.log;
    error_log /var/log/nginx/sponda.poe.ma-error.log;
}
