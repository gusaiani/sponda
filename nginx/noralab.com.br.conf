server {
    listen 80;
    server_name noralab.com.br www.noralab.com.br;
    return 301 https://noralab.com.br$request_uri;
}

server {
    listen 443 ssl;
    server_name noralab.com.br www.noralab.com.br;

    root /var/www/noralab.com.br/public_html;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/noralab.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/noralab.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    error_log /var/log/nginx/noralab.com.br-error.log;
}
