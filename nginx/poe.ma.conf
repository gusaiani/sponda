server {
    listen 80;
    server_name poe.ma www.poe.ma;
    return 301 https://poe.ma$request_uri;
}

server {
    listen 443 ssl;
    server_name poe.ma www.poe.ma;

    root /var/www/poe.ma/public_html;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/poe.ma/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/poe.ma/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    error_log /var/log/nginx/poe.ma-error.log;
}
