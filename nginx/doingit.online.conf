server {
    listen 80;
    server_name doingit.online www.doingit.online;
    return 301 https://doingit.online$request_uri;
}

server {
    listen 443 ssl;
    server_name doingit.online www.doingit.online;

    ssl_certificate /etc/letsencrypt/live/doingit.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/doingit.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8810;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
