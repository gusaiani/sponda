# Redirect HTTP and www to https://sponda.capital
server {
    listen 80;
    server_name sponda.capital www.sponda.capital;
    return 301 https://sponda.capital$request_uri;
}

server {
    listen 443 ssl;
    server_name www.sponda.capital;

    ssl_certificate /etc/letsencrypt/live/sponda.capital/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sponda.capital/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://sponda.capital$request_uri;
}

server {
    listen 443 ssl;
    server_name sponda.capital;

    ssl_certificate /etc/letsencrypt/live/sponda.capital/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sponda.capital/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    access_log /var/log/nginx/sponda.capital-access.log;
    error_log /var/log/nginx/sponda.capital-error.log;
}
