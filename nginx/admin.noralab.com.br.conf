server {
    listen 80;
    server_name admin.noralab.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name admin.noralab.com.br;

    ssl_certificate /etc/letsencrypt/live/admin.noralab.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.noralab.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:7600;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    error_log /var/log/nginx/admin.noralab.com.br-error.log;
}
