{{ define "main" }}
  {{- $posts := where site.RegularPages "Section" "posts" -}}
  <ul class="post-list">
    {{- range $posts.ByDate.Reverse }}
      <li class="post-list-item">
        <time class="post-list-date" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "02 Jan 2006" }}</time>
        <a class="post-list-title" href="{{ .RelPermalink }}">{{ .Title }}</a>
        {{ with .Params.summary }}<p class="post-list-summary">{{ . }}</p>{{ end }}
      </li>
    {{- end }}
  </ul>
{{ end }}
